name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test CLI
        run: |
          python -m deveval run --dataset examples/support_eval.jsonl --provider mock --model mock-v1 --prompt-template "You are a helpful support assistant." --metric contains:reset --workspace .
          python -m deveval runs --limit 5 --workspace .
